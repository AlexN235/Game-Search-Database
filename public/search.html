<!DOCTYPE html>
<html>
    <head>
        <meta charset='UTF-8' />
        <title>Game Searcher</title>
        <script src="axios/axios.min.js"> </script>
        <script src="js/search_app.js" type="module" defer> </script>
        
        <!-- font-awesome -->
        <link
          rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css"
        />
        <!-- styles -->
        <link rel="stylesheet" href="css/styles.css" />
    </head>
    
    <body>
        <section class="section-center">
            <h3 class='game-name-info'> Title </h3>
            <img src="fake.jpg"> </img>
            <div class="game-info-container">
                <div class="game-info-section">
                    <div class='game-rating'> 
                        <p><b> Rating: </b></p>
                        <p class='game-rating-info'> N/A </p>
                    </div>
                    <div class='game-genre'> 
                        <p><b> Genre: </b></p>
                        <p class='game-genre-info'> N/A </p>
                    </div>
                    <div class='game-summary'> 
                        <p><b>Summary:</b></p>
                        <p class='game-summary-info'> N/A </p>
                    </div>
                </div>
            </div>
        </section>
    </body>
</html>
