<!DOCTYPE html>
<html>
    <head>
        <meta charset='UTF-8' />
        <title>Game Searcher</title>
        <script src="/axios/axios.min.js"> </script>
        <script src="/js/game_details.js" type="module" defer> </script>
        
        <!-- font-awesome -->
        <link
          rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css"
        />
        <!-- styles -->
        <link rel="stylesheet" href="/css/styles.css" />
        <link rel="stylesheet" href="css/styles.css" />
    </head>
    
    <body>
        <header>
            <video class="video-container" controls muted autoplay loop>
                <source src="./example_video.mp4" type="video/mp4" />
            </video>
        </header>
        <section class="section-center">
            <!-- Main Info Section -->
            <div class="game-info-container">
                <div class="game-cover">
                    <img src="test.jpg"> </img>
                </div>
                <div class='game-rating'> 
                    <p><b> Rating: </b></p>
                    <p class='game-rating-info'> N/A </p>
                </div>
                <div class='game-genre'> 
                    <p><b> Genre: </b></p>
                    <p class='game-genre-info'> N/A </p>
                </div>
                <div class='game-summary'> 
                    <p><b>Summary:</b></p>
                    <p class='game-summary-info'> N/A </p>
                </div>
            </div>
            
            <!-- Sub/Extra Info Section -->
            
        </section>
        
    </body>
</html>
