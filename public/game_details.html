<!DOCTYPE html>
<html>
    <head>
        <meta charset='UTF-8' />
        <title>Game Searcher</title>
        <script src="/axios/axios.min.js"> </script>
        <script src="/js/game_details.js" type="module" defer> </script>
        
        <!-- font-awesome -->
        <link
          rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css"
        />
        <!-- styles -->
        <link rel="stylesheet" href="/css/styles.css" />
    </head>
    
    <body>
        <header>
            <video class="video-container" controls muted autoplay loop>
                <source src="./example_video.mp4" type="video/mp4" />
            </video>
        </header>
        <section class="section-center">
            <!-- Main Info Section -->
            <div class="game-info-container">
                <div class="upper-info-container">
                    <div class="game-cover">
                        <img src="test.jpg" class="game-cover-img"> </img>
                    </div>
                    <div class='game-name small-info-box'> 
                        <p><b> Name: </b></p>
                        <p class='game-name-info'> - </p>
                    </div>
                    <div class='game-rating small-info-box'> 
                        <p><b> Rating: </b></p>
                        <p class='game-rating-info'> - </p>
                    </div>
                    <div class='game-genre small-info-box'> 
                        <p><b> Genre: </b></p>
                        <p class='game-genre-info'> - </p>
                    </div>
                    <div class='game-platforms small-info-box'> 
                        <p><b>Platforms:</b></p>
                        <p class='game-platforms-info'> - </p>
                    </div>
                    <div class='game-engines small-info-box'> 
                        <p><b>Game Engines:</b></p>
                        <p class='game-engines-info'> - </p>
                    </div>
                </div>
                <div class="lower-info-container">
                    <div class='game-summary large-info-box'> 
                        <p><b>Summary:</b></p>
                        <p class='game-summary-info'> - </p>
                    </div>
                    <div class='game-keywords large-info-box'> 
                        <p><b>Keywords:</b></p>
                        <p class='game-keywords-info'> - </p>
                    </div>
                </div>
            </div>
            
            <!-- Sub/Extra Info Section -->
            
        </section>
        
    </body>
</html>
